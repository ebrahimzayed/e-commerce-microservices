apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-deployment
spec:
  selector:
    matchLabels:
      app: cart-deployment
  template:
    metadata:
      labels:
        app: cart-deployment
    spec:
      containers:
      - name: cart
        image: 429104603739.dkr.ecr.us-east-2.amazonaws.com/cart:latest
        imagePullPolicy: Always
        env:
        - name: SPRING_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: cart-configmap
              key: SPRING_REDIS_HOST
        - name: SPRING_REDIS_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: cart-configmap
              key: SPRING_REDIS_PASSWORD
        - name: SPRING_REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: cart-configmap
              key: SPRING_REDIS_PORT
        - name: SPRING_DATA_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: cart-configmap
              key: SPRING_DATA_REDIS_HOST
        - name: SPRING_DATA_REDIS_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: cart-configmap
              key: SPRING_DATA_REDIS_PASSWORD
        - name: SPRING_DATA_REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: cart-configmap
              key: SPRING_DATA_REDIS_PORT
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
