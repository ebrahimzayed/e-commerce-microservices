user  nginx;
worker_processes  1;
events {
  worker_connections  1024;
}
http {
  include /etc/nginx/mime.types;
  server {
    listen 80;
    root /store-ui;
    index index.html;
    location /api/products/ {
      proxy_pass http://products-api:5000/;
    }
    location /api/cart/ {
      proxy_pass http://cart-api:8080/;
    }
    location /api/users/ {
      proxy_pass http://users-api:9090/;
    }
    location /api/search/ {
      proxy_pass http://search-api:4000/;
    }
    location / {
      try_files $uri /index.html;
    }
  }
}
