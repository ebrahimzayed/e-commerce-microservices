apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ebrahimzayed/e-commerce-microservices.git'
    targetRevision: HEAD
    path: infra/k8s/apps/base
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: e-commerce
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
