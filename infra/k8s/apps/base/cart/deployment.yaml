apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-deployment
spec:
  selector:
    matchLabels:
      app: cart-deployment
  template:
    metadata:
      labels:
        app: cart-deployment
    spec:
      containers:
      - name: cart
        image: 429104603739.dkr.ecr.us-east-2.amazonaws.com/cart:latest
        imagePullPolicy: Always
        env:
        - name: SPRING_REDIS_HOST
          value: "redis-service.shared-services.svc.cluster.local"
        - name: SPRING_REDIS_PORT
          value: "6379"
        - name: SPRING_REDIS_PASSWORD
          value: ""
        - name: SPRING_DATA_REDIS_HOST
          value: "redis-service.shared-services.svc.cluster.local"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        - name: SPRING_DATA_REDIS_PASSWORD
          value: ""
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
