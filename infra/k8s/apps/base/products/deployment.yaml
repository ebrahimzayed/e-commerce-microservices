apiVersion: apps/v1
kind: Deployment
metadata:
  name: products-deployment
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: products-deployment
  template:
    metadata:
      labels:
        app: products-deployment
    spec:
      containers:
      - name: products
        image: 429104603739.dkr.ecr.us-east-2.amazonaws.com/products:latest
        imagePullPolicy: Always
        env:
        - name: MONGO_URI
          valueFrom:
            configMapKeyRef:
              name: products-configmap
              key: MONGO_URI
        - name: DATABASE
          valueFrom:
            configMapKeyRef:
              name: products-configmap
              key: DATABASE
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
